name: Sync to Gitee (Skip LFS)
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_KEY }}
          log-public-key: false
      - name: Add Gitee to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts
      - name: Disable Git LFS for Gitee
        run: |
          git lfs uninstall || true
          git config --global lfs.https://gitee.com/.locksverify false
      - name: Push to Gitee (Skip LFS)
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          GITEE_URL="git@gitee.com:${{ secrets.GITEE_USERNAME }}/resources.git"
          echo "Push to: ${GITEE_URL}"
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "${GITEE_URL}"
          git push gitee --all --force
          git push gitee --tags --force || true
      - name: Sync Result
        if: always()
        run: |
          echo "=== Sync Completed ==="
          echo "GitHub: https://github.com/${{ github.repository }}"
          echo "Gitee: https://gitee.com/${{ secrets.GITEE_USERNAME }}/resources"
