name: Sync to Gitee
on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_KEY }}
          log-public-key: false
      
      - name: Add Gitee to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H gitee.com >> ~/.ssh/known_hosts
      
      - name: Push to Gitee
        run: |
          # 添加 Gitee 远程仓库
          git remote add gitee git@gitee.com:${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}.git
          
          # 推送到 Gitee 的所有分支
          git push gitee --all --force
          
          # 推送到 Gitee 的所有标签
          git push gitee --tags --force
          
          echo "✅ 同步到 Gitee 成功！"
      
      - name: Sync Result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 同步完成！"
            echo "GitHub: https://github.com/${{ github.repository }}"
            echo "Gitee: https://gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}"
          else
            echo "❌ 同步失败，请检查配置"
          fi
